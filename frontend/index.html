<!DOCTYPE html>
<html>

<head>

    <title>SmartStudy AI</title>

    <style>

        body {
            font-family: Arial;
            padding: 40px;
            background: #f4f4f4;
        }

        textarea {
            width: 400px;
            height: 100px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
        }

        #result {
            margin-top: 20px;
            background: white;
            padding: 20px;
        }

    </style>

</head>

<body>

<h1>🤖 SmartStudy AI</h1>

<h3>Enter your learning goal:</h3>

<textarea id="goal"></textarea>

<br>

<button onclick="generatePlan()">
Generate Study Plan
</button>

<div id="result"></div>

<script>

async function generatePlan() {

    let goal =
        document.getElementById("goal").value;

    let response = await fetch(
        "http://127.0.0.1:5000/generate-plan",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                goal: goal
            })
        }
    );

    let data = await response.json();

    document.getElementById("result")
        .innerHTML =
        "<h2>Study Plan:</h2><p>" +
        data.study_plan +
        "</p>";
}

</script>

</body>

</html>
