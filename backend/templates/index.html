<!DOCTYPE html>
<html>

<head>

    <title>SmartStudy AI</title>

    <style>

        body {
            font-family: Arial;
            padding: 40px;
            background: #f4f4f4;
        }

        textarea {
            width: 500px;
            height: 150px;
            font-size: 18px;
            padding: 10px;
        }

        button {
            padding: 12px 20px;
            margin-top: 15px;
            font-size: 18px;
            cursor: pointer;
        }

        #result {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            width: 700px;
        }

    </style>

</head>

<body>

<h1>🤖 SmartStudy AI</h1>

<h3>Enter your learning goal:</h3>

<textarea
    id="goal"
    placeholder="Example: Learn DSA in 20 days">
</textarea>

<br>

<button onclick="generatePlan()">
    Generate Study Plan
</button>

<div id="result"></div>

<script>

async function generatePlan() {

    const goal =
        document.getElementById("goal").value;

    document.getElementById("result").innerHTML =
        "<h2>Generating Study Plan...</h2>";

    try {

        const response = await fetch(
            "/generate-plan",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    goal: goal
                })
            }
        );

        const data = await response.json();

        if (data.plan) {

            document.getElementById("result").innerHTML =
                "<h2>📚 Study Plan:</h2><p>" +
                data.plan +
                "</p>";

        }

        else {

            document.getElementById("result").innerHTML =
                "<h2>❌ Error:</h2><p>" +
                data.error +
                "</p>";
        }

    }

    catch(error) {

        document.getElementById("result").innerHTML =
            "<h2>❌ Error generating study plan</h2>";

        console.log(error);
    }
}

</script>

</body>

</html>
